name: MacOS Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - .github/**
      - "!.github/workflows/macos_build.yml"
      - "**.md"
      - "docs/**"
  push:
    branches:
      - main
    paths-ignore:
      - .github/**
      - "!.github/workflows/macos_build.yml"
      - "**.md"
      - "docs/**"

env:
  BATCH_MKV_MERGE_VERSION: 0.1.0

jobs:
  build_package:
    strategy:
      matrix:
        include:
          - image: macos-15-intel
            os: macos
            arch: x86_64
          - image: macos-15
            os: macos
            arch: arm64

    name: Build for ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.image }}

    steps:
    - name: Set git to use LF
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Checkout the code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        # The action sets RUSTFLAGS=-D warnings by default, which turns every
        # rustc warning into a CI failure. Phased delivery of the
        # media_metadata parser intentionally lands public fns before their
        # consumers (next phase fills them in), so transient "never used"
        # warnings are expected. Clearing the flag lets warnings stay warnings.
        rustflags: ""

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: 11

    - name: Install JS deps and build frontend
      # `pnpm build` runs first so `tauri_build::build()` (invoked from
      # src-tauri/build.rs at every cargo invocation) sees the frontendDist
      # directory. Without it `cargo test` can't even compile.
      run: |
        pnpm install --frozen-lockfile
        pnpm build

    - name: Run Rust tests
      working-directory: src-tauri
      run: cargo test -r

    - name: Build BatchMkvMerge
      run: pnpm tauri build

    - name: Upload the Artifact
      uses: actions/upload-artifact@v7
      with:
        name: BatchMkvMerge-${{ matrix.os }}-${{ matrix.arch }}-${{ env.BATCH_MKV_MERGE_VERSION }}
        path: |
          src-tauri/target/release/bundle/dmg/*.dmg
